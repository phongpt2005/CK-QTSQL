<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ERD Chen - Luồng Hạ Tầng Kho</title>
<style>
  body { margin: 0; background: #fff; font-family: 'Segoe UI', Arial, sans-serif; }
  svg { display: block; margin: 20px auto; }
  .entity { fill: #4a6cf7; stroke: #333; stroke-width: 2; }
  .entity-text { fill: #fff; font-weight: bold; font-size: 16px; text-anchor: middle; dominant-baseline: central; }
  .relationship { fill: #e74c3c; stroke: #333; stroke-width: 2; }
  .rel-text { fill: #fff; font-weight: bold; font-size: 12px; text-anchor: middle; dominant-baseline: central; }
  .attribute { fill: #f1c40f; stroke: #333; stroke-width: 1.5; }
  .attr-text { fill: #333; font-size: 11px; text-anchor: middle; dominant-baseline: central; }
  .pk-attr { fill: #f39c12; stroke: #333; stroke-width: 2; }
  .pk-text { fill: #333; font-size: 11px; text-anchor: middle; dominant-baseline: central; text-decoration: underline; }
  .link { stroke: #555; stroke-width: 2; fill: none; }
  .cardinality { fill: #333; font-size: 13px; font-weight: bold; }
  h1 { text-align: center; color: #2c3e50; margin-top: 20px; }
</style>
</head>
<body>
<h1>ERD Chen – Luồng Hạ Tầng Kho (Infrastructure)</h1>
<svg width="900" height="500" viewBox="0 0 900 500">
  <!-- Warehouses Entity -->
  <rect x="150" y="80" width="180" height="50" rx="4" class="entity"/>
  <text x="240" y="105" class="entity-text">Warehouses</text>

  <!-- Locations Entity -->
  <rect x="560" y="80" width="180" height="50" rx="4" class="entity"/>
  <text x="650" y="105" class="entity-text">Locations</text>

  <!-- Relationship: contains -->
  <polygon points="450,105 490,80 530,105 490,130" class="relationship"/>
  <text x="490" y="105" class="rel-text">chứa</text>

  <!-- Links entity to relationship -->
  <line x1="330" y1="105" x2="450" y2="105" class="link"/>
  <line x1="530" y1="105" x2="560" y2="105" class="link"/>

  <!-- Cardinality -->
  <text x="345" y="95" class="cardinality">1</text>
  <text x="545" y="95" class="cardinality">N</text>

  <!-- Warehouses Attributes -->
  <ellipse cx="100" cy="200" rx="40" ry="20" class="pk-attr"/>
  <text x="100" y="200" class="pk-text">id (PK)</text>
  <line x1="100" y1="180" x2="200" y2="130" class="link"/>

  <ellipse cx="210" cy="210" rx="40" ry="20" class="attribute"/>
  <text x="210" y="210" class="attr-text">code</text>
  <line x1="210" y1="190" x2="230" y2="130" class="link"/>

  <ellipse cx="320" cy="210" rx="40" ry="20" class="attribute"/>
  <text x="320" y="210" class="attr-text">name</text>
  <line x1="320" y1="190" x2="260" y2="130" class="link"/>

  <ellipse cx="380" cy="180" rx="45" ry="20" class="attribute"/>
  <text x="380" y="180" class="attr-text">address</text>
  <line x1="380" y1="165" x2="290" y2="130" class="link"/>

  <!-- Locations Attributes -->
  <ellipse cx="520" cy="220" rx="40" ry="20" class="pk-attr"/>
  <text x="520" y="220" class="pk-text">id (PK)</text>
  <line x1="520" y1="200" x2="610" y2="130" class="link"/>

  <ellipse cx="620" cy="230" rx="55" ry="20" class="attribute"/>
  <text x="620" y="230" class="attr-text">warehouse_id</text>
  <line x1="620" y1="210" x2="640" y2="130" class="link"/>

  <ellipse cx="730" cy="220" rx="40" ry="20" class="attribute"/>
  <text x="730" y="220" class="attr-text">code</text>
  <line x1="730" y1="200" x2="670" y2="130" class="link"/>

  <ellipse cx="830" cy="200" rx="40" ry="20" class="attribute"/>
  <text x="830" y="200" class="attr-text">type</text>
  <line x1="810" y1="190" x2="710" y2="130" class="link"/>

  <ellipse cx="560" cy="310" rx="40" ry="20" class="attribute"/>
  <text x="560" y="310" class="attr-text">zone</text>
  <line x1="560" y1="290" x2="630" y2="130" class="link"/>

  <ellipse cx="670" cy="310" rx="40" ry="20" class="attribute"/>
  <text x="670" y="310" class="attr-text">shelf</text>
  <line x1="670" y1="290" x2="650" y2="130" class="link"/>

  <ellipse cx="780" cy="310" rx="40" ry="20" class="attribute"/>
  <text x="780" y="310" class="attr-text">bin</text>
  <line x1="780" y1="290" x2="680" y2="130" class="link"/>
</svg>
</body>
</html>
